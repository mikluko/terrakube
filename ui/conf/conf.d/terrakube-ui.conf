server {
  listen 0.0.0.0:8080;
  listen [::]:8080;

  root /usr/share/nginx/html;
  index index.html index.htm;

  # Hashed build assets: immutable, and never fall back to index.html.
  # Serving HTML for a missing chunk makes dynamic import() fail with
  # "Importing a module script failed" after a redeploy; a 404 lets the
  # client detect the stale chunk and recover.
  location /assets/ {
    try_files $uri =404;
    add_header Cache-Control "public, max-age=31536000, immutable";
  }

  # SPA shell and runtime config (index.html, env-config.js): always
  # revalidate so a new deployment is picked up immediately.
  location / {
    try_files $uri $uri/ /index.html;
    add_header Cache-Control "no-cache";
  }
}
